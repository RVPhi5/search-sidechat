<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sidechat Search</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #c4488f;
      --surface: #1a1a1a;
      --surface-hover: #222;
      --border: #2a2a2a;
      --text: #e8e8e8;
      --text-dim: #888;
      --accent: #ff66cc;
      --accent-soft: #ff66cc25;
      --green: #00b894;
      --red: #e17055;
      --radius: 10px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      min-height: 100vh;
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
      padding: 24px 16px;
    }

    header {
      text-align: center;
      margin-bottom: 32px;
    }

    header h1 {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: #fff;
    }

    .stats-bar {
      display: flex;
      gap: 16px;
      justify-content: center;
      margin-top: 8px;
      font-size: 0.8rem;
      color: rgba(255,255,255,0.75);
    }

    .search-box {
      position: sticky;
      top: 0;
      z-index: 10;
      background: var(--bg);
      padding: 12px 0 16px;
    }

    .search-row {
      display: flex;
      gap: 8px;
    }

    .search-row input {
      flex: 1;
      padding: 12px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.15s;
    }

    .search-row input:focus {
      border-color: var(--accent);
    }

    .search-row input::placeholder {
      color: var(--text-dim);
    }

    .controls {
      display: flex;
      gap: 8px;
      margin-top: 8px;
      flex-wrap: wrap;
    }

    .controls select, .controls input[type="month"], .controls input[type="date"] {
      padding: 6px 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 0.82rem;
      cursor: pointer;
    }

    .controls input[type="month"], .controls input[type="date"] {
      color-scheme: dark;
    }

    .date-inputs {
      display: none;
      gap: 6px;
      align-items: center;
    }

    .date-inputs.visible {
      display: flex;
    }

    .date-inputs label {
      font-size: 0.78rem;
      color: #fff;
    }

    .result-count {
      margin-left: auto;
      font-size: 0.82rem;
      color: rgba(255,255,255,0.75);
      align-self: center;
    }

    .posts {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .post {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      transition: background 0.12s;
    }

    .post:hover {
      background: var(--surface-hover);
    }

    .post-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      font-size: 0.82rem;
      color: var(--text-dim);
    }

    .post-alias {
      font-weight: 600;
      color: var(--text);
    }

    .post-emoji {
      font-size: 1rem;
    }

    .post-text {
      font-size: 0.95rem;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .post-footer {
      display: flex;
      gap: 16px;
      margin-top: 10px;
      font-size: 0.78rem;
      color: var(--text-dim);
    }

    .vote-positive { color: var(--green); }
    .vote-negative { color: var(--red); }

    .quoted-post {
      margin-bottom: 10px;
      padding: 10px 12px;
      background: var(--border);
      border-left: 3px solid var(--accent);
      border-radius: 4px;
      font-size: 0.84rem;
    }

    .quoted-post .quoted-header {
      font-size: 0.75rem;
      color: var(--text-dim);
      margin-bottom: 4px;
    }

    .quoted-post .quoted-text {
      color: var(--text-dim);
      white-space: pre-wrap;
      word-break: break-word;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .poll {
      margin-top: 10px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .poll-choice {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.85rem;
    }

    .poll-label {
      min-width: 80px;
      max-width: 120px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .poll-bar-track {
      flex: 1;
      height: 22px;
      background: var(--border);
      border-radius: 4px;
      overflow: hidden;
      position: relative;
    }

    .poll-bar-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 4px;
      min-width: 2px;
    }

    .poll-bar-fill.winner {
      background: var(--green);
    }

    .poll-count {
      font-size: 0.78rem;
      color: var(--text-dim);
      min-width: 70px;
      text-align: right;
      flex-shrink: 0;
    }

    .poll-total {
      font-size: 0.75rem;
      color: var(--text-dim);
      margin-top: 2px;
    }

    .post-media {
      margin-top: 8px;
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .post-media img, .post-media video {
      max-width: 100%;
      max-height: 400px;
      border-radius: 8px;
      object-fit: contain;
      background: #000;
    }

    .pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      margin-top: 24px;
      padding-bottom: 24px;
    }

    .pagination button {
      padding: 8px 18px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      cursor: pointer;
      font-size: 0.85rem;
    }

    .pagination button:disabled {
      opacity: 0.3;
      cursor: default;
    }

    .pagination span {
      font-size: 0.85rem;
      color: #fff;
    }

    .post.clickable {
      cursor: pointer;
    }

    .detail-view {
      display: none;
    }

    .detail-view.active {
      display: block;
    }

    .search-view.hidden {
      display: none;
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      cursor: pointer;
      font-size: 0.85rem;
      margin-bottom: 16px;
    }

    .back-btn:hover {
      background: var(--surface-hover);
    }

    .comments-section {
      margin-top: 20px;
    }

    .comments-section h3 {
      font-size: 0.95rem;
      color: #fff;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }

    .comment {
      padding: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 6px;
    }

    .comment.reply {
      margin-left: 24px;
      border-left: 2px solid var(--accent);
    }

    .comment-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
      font-size: 0.8rem;
      color: var(--text-dim);
    }

    .comment-header .post-alias {
      font-weight: 600;
      color: var(--text);
    }

    .comment-text {
      font-size: 0.9rem;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .comment-footer {
      display: flex;
      gap: 12px;
      margin-top: 6px;
      font-size: 0.75rem;
      color: var(--text-dim);
    }

    .comment-media {
      margin-top: 6px;
    }

    .comment-media img, .comment-media video {
      max-width: 100%;
      max-height: 300px;
      border-radius: 6px;
      object-fit: contain;
      background: #000;
    }

    .no-comments {
      text-align: center;
      padding: 24px;
      color: #fff;
      font-size: 0.88rem;
    }

    .empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-dim);
    }

    .empty p:first-child {
      font-size: 1.1rem;
      margin-bottom: 6px;
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: var(--text-dim);
    }

    mark {
      background: var(--accent-soft);
      color: var(--accent);
      border-radius: 2px;
      padding: 0 2px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div id="searchView" class="search-view">
      <header>
        <h1>Sidechat Search</h1>
        <div class="stats-bar" id="stats"></div>
        <a href="/cool-stats.html" style="display:inline-block;margin-top:10px;padding:6px 16px;background:var(--surface);border:1px solid var(--border);border-radius:6px;color:#fff;font-size:0.82rem;text-decoration:none;transition:background 0.12s;" onmouseover="this.style.background='var(--surface-hover)'" onmouseout="this.style.background='var(--surface)'">Cool Stats</a>
      </header>

      <div class="search-box">
        <div class="search-row">
          <input type="text" id="query" placeholder="Search posts..." autofocus>
        </div>
        <div class="controls">
          <select id="sort">
            <option value="">Relevance</option>
            <option value="created_at">Date</option>
            <option value="vote_total">Votes</option>
            <option value="comment_count">Comments</option>
          </select>
          <select id="order">
            <option value="DESC">Descending</option>
            <option value="ASC">Ascending</option>
          </select>
          <select id="timeRange">
            <option value="">All time</option>
            <option value="24h">Last 24 hours</option>
            <option value="7d">Last 7 days</option>
            <option value="30d">Last 30 days</option>
            <option value="month">Pick month</option>
            <option value="custom">Custom range</option>
          </select>
          <div class="date-inputs" id="monthPicker">
            <input type="month" id="monthInput">
          </div>
          <div class="date-inputs" id="customRange">
            <label>From</label>
            <input type="date" id="dateFrom">
            <label>To</label>
            <input type="date" id="dateTo">
          </div>
          <span class="result-count" id="resultCount"></span>
        </div>
      </div>

      <div id="posts" class="posts"></div>
      <div id="pagination" class="pagination"></div>
    </div>

    <div id="detailView" class="detail-view">
      <button class="back-btn" id="backBtn">&larr; Back to results</button>
      <div id="detailContent"></div>
    </div>
  </div>

  <script>
    const $query = document.getElementById("query");
    const $sort = document.getElementById("sort");
    const $order = document.getElementById("order");
    const $timeRange = document.getElementById("timeRange");
    const $monthPicker = document.getElementById("monthPicker");
    const $monthInput = document.getElementById("monthInput");
    const $customRange = document.getElementById("customRange");
    const $dateFrom = document.getElementById("dateFrom");
    const $dateTo = document.getElementById("dateTo");
    const $posts = document.getElementById("posts");
    const $pagination = document.getElementById("pagination");
    const $resultCount = document.getElementById("resultCount");
    const $stats = document.getElementById("stats");
    const $searchView = document.getElementById("searchView");
    const $detailView = document.getElementById("detailView");
    const $detailContent = document.getElementById("detailContent");
    const $backBtn = document.getElementById("backBtn");

    let currentPage = 1;
    let debounceTimer;

    function showSearchView() {
      $searchView.classList.remove("hidden");
      $detailView.classList.remove("active");
    }

    function showDetailView() {
      $searchView.classList.add("hidden");
      $detailView.classList.add("active");
      window.scrollTo(0, 0);
    }

    $backBtn.addEventListener("click", () => {
      history.back();
    });

    window.addEventListener("popstate", (e) => {
      if (e.state?.postId) {
        loadPostDetail(e.state.postId, false);
      } else {
        showSearchView();
      }
    });

    function getDateRange() {
      const range = $timeRange.value;
      if (!range) return {};
      if (range === "24h") return { after: new Date(Date.now() - 86400000).toISOString() };
      if (range === "7d") return { after: new Date(Date.now() - 7 * 86400000).toISOString() };
      if (range === "30d") return { after: new Date(Date.now() - 30 * 86400000).toISOString() };
      if (range === "month" && $monthInput.value) {
        const [y, m] = $monthInput.value.split("-").map(Number);
        const after = new Date(y, m - 1, 1).toISOString();
        const before = new Date(y, m, 1).toISOString();
        return { after, before };
      }
      if (range === "custom") {
        const result = {};
        if ($dateFrom.value) result.after = new Date($dateFrom.value).toISOString();
        if ($dateTo.value) {
          const to = new Date($dateTo.value);
          to.setDate(to.getDate() + 1);
          result.before = to.toISOString();
        }
        return result;
      }
      return {};
    }

    $timeRange.addEventListener("change", () => {
      $monthPicker.classList.toggle("visible", $timeRange.value === "month");
      $customRange.classList.toggle("visible", $timeRange.value === "custom");
      if ($timeRange.value !== "month" && $timeRange.value !== "custom") search(1);
    });
    $monthInput.addEventListener("change", () => search(1));
    $dateFrom.addEventListener("change", () => search(1));
    $dateTo.addEventListener("change", () => search(1));

    async function loadStats() {
      try {
        const res = await fetch("/api/stats");
        const s = await res.json();
        if (!s.total_posts) {
          $stats.textContent = "No posts in database yet. Run the scraper first.";
          return;
        }
        const oldest = new Date(s.oldest_post).toLocaleDateString();
        const newest = new Date(s.newest_post).toLocaleDateString();
        $stats.innerHTML = [
          `<span>${s.total_posts.toLocaleString()} posts</span>`,
          `<span>${oldest} \u2013 ${newest}</span>`,
          `<span>avg ${s.avg_votes} votes</span>`,
        ].join("");
      } catch {}
    }

    async function search(page = 1) {
      currentPage = page;
      const q = $query.value.trim();
      const sort = $sort.value;
      const order = $order.value;

      const params = new URLSearchParams({ page });
      if (q) params.set("q", q);
      if (sort) params.set("sort", sort);
      params.set("order", order);
      const dateRange = getDateRange();
      if (dateRange.after) params.set("after", dateRange.after);
      if (dateRange.before) params.set("before", dateRange.before);

      $posts.innerHTML = '<div class="loading">Searching...</div>';

      try {
        const res = await fetch(`/api/search?${params}`);
        const data = await res.json();

        if (data.error) {
          $posts.innerHTML = `<div class="empty"><p>Error</p><p>${data.error}</p></div>`;
          $resultCount.textContent = "";
          $pagination.innerHTML = "";
          return;
        }

        $resultCount.textContent = `${data.total.toLocaleString()} result${data.total === 1 ? "" : "s"}`;
        renderPosts(data.posts, q);
        renderPagination(data.page, data.pages);
      } catch (err) {
        $posts.innerHTML = `<div class="empty"><p>Failed to search</p><p>${err.message}</p></div>`;
      }
    }

    function escapeHTML(str) {
      const div = document.createElement("div");
      div.textContent = str;
      return div.innerHTML;
    }

    function highlightText(text, query) {
      if (!query) return escapeHTML(text);
      const escaped = escapeHTML(text);
      const words = query.split(/\s+/).filter(Boolean).map(w =>
        w.replace(/[.*+?^${}()|[\]\\]/g, "\\$&")
      );
      if (!words.length) return escaped;
      const re = new RegExp(`(${words.join("|")})`, "gi");
      return escaped.replace(re, "<mark>$1</mark>");
    }

    function timeAgo(dateStr) {
      const diff = Date.now() - new Date(dateStr).getTime();
      const mins = Math.floor(diff / 60000);
      if (mins < 60) return `${mins}m ago`;
      const hrs = Math.floor(mins / 60);
      if (hrs < 24) return `${hrs}h ago`;
      const days = Math.floor(hrs / 24);
      if (days < 30) return `${days}d ago`;
      const months = Math.floor(days / 30);
      return `${months}mo ago`;
    }

    function renderPostCard(p, query, clickable = true) {
      const assets = JSON.parse(p.assets || "[]");
      const voteClass = p.vote_total > 0 ? "vote-positive" : p.vote_total < 0 ? "vote-negative" : "";

      let quoteHTML = "";
      if (p.quoted_post) {
        const qp = p.quoted_post;
        const qName = escapeHTML(qp.identity_name || qp.alias || "Anonymous");
        quoteHTML = `<div class="quoted-post">
          <div class="quoted-header">\u21A9 Replying to ${qName}</div>
          <div class="quoted-text">${escapeHTML(qp.text || "")}</div>
        </div>`;
      }

      let pollHTML = "";
      if (p.has_poll && p.poll_data) {
        try {
          const poll = JSON.parse(p.poll_data);
          const totalVotes = poll.choices.reduce((s, c) => s + c.count, 0);
          const maxCount = Math.max(...poll.choices.map(c => c.count));
          pollHTML = `<div class="poll">` +
            poll.choices.map(c => {
              const pct = totalVotes ? Math.round(c.count / totalVotes * 100) : 0;
              const isWinner = c.count === maxCount && totalVotes > 0;
              return `<div class="poll-choice">
                <span class="poll-label" title="${escapeHTML(c.text)}">${escapeHTML(c.text)}</span>
                <div class="poll-bar-track"><div class="poll-bar-fill${isWinner ? " winner" : ""}" style="width:${pct}%"></div></div>
                <span class="poll-count">${c.count} (${pct}%)</span>
              </div>`;
            }).join("") +
            `<div class="poll-total">${totalVotes} votes</div></div>`;
        } catch {}
      }

      const mediaEls = assets.map(a => {
        const proxied = `/api/asset?url=${encodeURIComponent(a.url)}`;
        if (a.type === "video") return `<video src="${proxied}" controls preload="none"></video>`;
        return `<img src="${proxied}" loading="lazy" alt="Post image">`;
      });

      const highlightFn = query ? (t) => highlightText(t, query) : escapeHTML;

      return `
        <div class="post${clickable ? " clickable" : ""}" ${clickable ? `data-post-id="${p.id}"` : ""}>
          <div class="post-header">
            ${p.identity_emoji ? `<span class="post-emoji">${p.identity_emoji}</span>` : ""}
            <span class="post-alias">${escapeHTML(p.identity_name || p.alias || "Anonymous")}</span>
            <span>\u00B7</span>
            <span>${timeAgo(p.created_at)}</span>
          </div>
          ${quoteHTML}
          <div class="post-text">${highlightFn(p.text)}</div>
          ${pollHTML}
          ${mediaEls.length ? `<div class="post-media">${mediaEls.join("")}</div>` : ""}
          <div class="post-footer">
            <span class="${voteClass}">\u25B2 ${p.vote_total}</span>
            <span>\uD83D\uDCAC ${p.comment_count}</span>
            <span>${new Date(p.created_at).toLocaleString()}</span>
          </div>
        </div>
      `;
    }

    function renderPosts(posts, query) {
      if (!posts.length) {
        $posts.innerHTML = '<div class="empty"><p>No posts found</p><p>Try a different search term</p></div>';
        return;
      }

      $posts.innerHTML = posts.map(p => renderPostCard(p, query, true)).join("");

      $posts.querySelectorAll(".post.clickable").forEach(el => {
        el.addEventListener("click", (e) => {
          if (e.target.closest("video, a")) return;
          const postId = el.dataset.postId;
          history.pushState({ postId }, "", `#post/${postId}`);
          loadPostDetail(postId, false);
        });
      });
    }

    function renderPagination(page, pages) {
      if (pages <= 1) { $pagination.innerHTML = ""; return; }
      $pagination.innerHTML = `
        <button ${page <= 1 ? "disabled" : ""} onclick="search(${page - 1})">\u2190 Prev</button>
        <span>${page} / ${pages}</span>
        <button ${page >= pages ? "disabled" : ""} onclick="search(${page + 1})">Next \u2192</button>
      `;
    }

    function renderComment(c, isReply = false) {
      const assets = JSON.parse(c.assets || "[]");
      const voteClass = c.vote_total > 0 ? "vote-positive" : c.vote_total < 0 ? "vote-negative" : "";
      const mediaEls = assets.map(a => {
        const proxied = `/api/asset?url=${encodeURIComponent(a.url)}`;
        if (a.type === "video") return `<video src="${proxied}" controls preload="none"></video>`;
        return `<img src="${proxied}" loading="lazy" alt="Comment image">`;
      });

      return `
        <div class="comment${isReply ? " reply" : ""}">
          <div class="comment-header">
            ${c.identity_emoji ? `<span class="post-emoji">${c.identity_emoji}</span>` : ""}
            <span class="post-alias">${escapeHTML(c.identity_name || c.alias || "Anonymous")}</span>
            <span>\u00B7</span>
            <span>${timeAgo(c.created_at)}</span>
          </div>
          <div class="comment-text">${escapeHTML(c.text)}</div>
          ${mediaEls.length ? `<div class="comment-media">${mediaEls.join("")}</div>` : ""}
          <div class="comment-footer">
            <span class="${voteClass}">\u25B2 ${c.vote_total}</span>
            <span>${new Date(c.created_at).toLocaleString()}</span>
          </div>
        </div>
      `;
    }

    async function loadPostDetail(postId, pushState = true) {
      showDetailView();
      $detailContent.innerHTML = '<div class="loading">Loading post...</div>';

      if (pushState) {
        history.pushState({ postId }, "", `#post/${postId}`);
      }

      try {
        const res = await fetch(`/api/post/${postId}`);
        if (!res.ok) {
          $detailContent.innerHTML = '<div class="empty"><p>Post not found</p></div>';
          return;
        }
        const { post, comments } = await res.json();

        const postHTML = renderPostCard(post, null, false);

        const topLevel = [];
        const repliesMap = {};
        for (const c of comments) {
          if (!c.reply_post_id || c.reply_post_id === postId) {
            topLevel.push(c);
          } else {
            if (!repliesMap[c.reply_post_id]) repliesMap[c.reply_post_id] = [];
            repliesMap[c.reply_post_id].push(c);
          }
        }

        let commentsHTML = "";
        if (!comments.length && post.comment_count > 0) {
          commentsHTML = `<div class="no-comments">Comments are still being loaded. Check back soon.</div>`;
        } else if (!comments.length) {
          commentsHTML = `<div class="no-comments">No comments</div>`;
        } else {
          for (const c of topLevel) {
            commentsHTML += renderComment(c, false);
            const replies = repliesMap[c.id] || [];
            for (const r of replies) {
              commentsHTML += renderComment(r, true);
            }
          }
        }

        $detailContent.innerHTML = `
          ${postHTML}
          <div class="comments-section">
            <h3>\uD83D\uDCAC ${comments.length} Comment${comments.length === 1 ? "" : "s"}</h3>
            ${commentsHTML}
          </div>
        `;
      } catch (err) {
        $detailContent.innerHTML = `<div class="empty"><p>Failed to load post</p><p>${err.message}</p></div>`;
      }
    }

    $query.addEventListener("input", () => {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(() => search(1), 250);
    });

    $sort.addEventListener("change", () => search(1));
    $order.addEventListener("change", () => search(1));

    $query.addEventListener("keydown", (e) => {
      if (e.key === "Enter") { clearTimeout(debounceTimer); search(1); }
    });

    loadStats();

    const hash = window.location.hash;
    if (hash.startsWith("#post/")) {
      const postId = hash.slice(6);
      loadPostDetail(postId, false);
      history.replaceState({ postId }, "", hash);
    } else {
      search(1);
    }
  </script>
</body>
</html>
